version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_SUPABASE_URL: https://ovfadrjlpnbseblcrvcr.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_zxTWZlBLGsOWqh8JDC1weQ_IXG73lRj
    command: npm run dev -- --host 0.0.0.0

volumes:
  upload_data:
