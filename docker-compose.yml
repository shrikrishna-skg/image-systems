version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8989:8989"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      # Copy frontend/.env.example → frontend/.env (publishable key + URL). Do not commit .env.
      - ./frontend/.env
    environment:
      # Same-origin /api so the browser hits Vite; Vite proxies to the backend container.
      VITE_API_BASE_URL: /api
      API_PROXY_TARGET: http://backend:8000
    command: npm run dev -- --host 0.0.0.0 --port 8989

volumes:
  upload_data:
