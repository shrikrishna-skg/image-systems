# CI: Gradle (Java 21) backend + Vite frontend (npm workspaces).
# CD: Default path is Vercel ↔ GitHub (repo import): each push to main builds on Vercel using root vercel.json.
# Optional: run this workflow manually (Actions → CI / CD → Run workflow) to deploy via Vercel CLI
#   after adding VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in repo Secrets.
name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Gradle / Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend-java

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            backend-java/build.gradle.kts
            backend-java/settings.gradle.kts
            backend-java/gradle/wrapper/gradle-wrapper.properties

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew clean build --no-daemon --stacktrace

  frontend:
    name: Frontend (Vite / Node)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NPM_CONFIG_PRODUCTION: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w frontend

      - name: Test
        run: npm test -w frontend

      - name: Build
        run: npm run build

  # Avoid automatic deploy on push: it fails without secrets and duplicates Vercel’s native Git deploy.
  deploy-vercel-cli:
    name: Deploy frontend (Vercel CLI, manual only)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          NPM_CONFIG_PRODUCTION: "false"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy (prebuilt, production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
