# Mirrors the Vercel build: install (with devDependencies for tsc) → build → lint.
#
# Vercel (this repo): leave Project "Root Directory" empty / repository root — not `frontend`.
# Otherwise dashboard cwd skips root vercel.json (installCommand, outputDirectory).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NPM_CONFIG_PRODUCTION: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
